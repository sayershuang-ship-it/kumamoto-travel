name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - run: npm install --no-audit --prefer-offline --no-fund
      - run: npx astro build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CF_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CF_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: 5c6837ef78c66d521d6e450a91c7bd61
        run: |
          npx wrangler pages deploy dist --project-name=kumamoto-travel --branch=main
